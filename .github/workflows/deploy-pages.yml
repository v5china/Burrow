name: Deploy landing page to GitHub Pages

# Publishes the static site in docs/ to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
