name: Deploy landing page to GitHub Pages

# Publishes the static site in docs/ to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not floating tags): a moved tag would
      # otherwise run unreviewed third-party code in a job that holds
      # pages:write + id-token:write. Trailing comment keeps the version legible.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
