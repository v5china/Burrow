name: windows-ci

# Build + run the WinUI unit suite for the Windows app (windows/). Path-filtered
# so it only runs when the Windows tree (or this workflow) changes — the macOS
# app has its own ci.yml on macos-15. Together they cover the macos/ + windows/
# monorepo.

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    paths:
      - "windows/**"
      - ".github/workflows/windows-ci.yml"

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 30
    # The Windows app lives under windows/; everything below is relative to it.
    defaults:
      run:
        working-directory: windows
    steps:
      # Pinned to a SHA (supply-chain hygiene), matching the macOS ci.yml.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # TODO: pin setup-dotnet / upload-artifact to commit SHAs to match the
      # checkout pin above (left as floating major tags pending a verified SHA).
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\BurrowWin.sln

      - name: Build app
        run: dotnet build .\BurrowWin.csproj -c Release -p:Platform=x64 -nr:false -v:minimal

      - name: Build tests
        run: dotnet build .\Tests\BurrowWin.Tests\BurrowWin.Tests.csproj -c Release -nr:false -v:minimal

      - name: Test
        run: dotnet test .\Tests\BurrowWin.Tests\BurrowWin.Tests.csproj -c Release --no-build -v:minimal --logger "trx;LogFileName=burrowwin-tests.trx" --results-directory .\artifacts\test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burrowwin-test-results
          path: windows/artifacts/test-results
          if-no-files-found: ignore

      - name: Publish dry run
        run: dotnet publish .\BurrowWin.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained false -o .\artifacts\ci-publish -v:minimal
