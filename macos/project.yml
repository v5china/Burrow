# xcodegen spec — single source of truth for the Burrow Xcode project.
# Regenerate with `xcodegen generate`. The .xcodeproj is gitignored so
# diffs stay readable; the spec is small and stable.
name: Burrow
options:
  bundleIdPrefix: dev.caezium
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Unsigned dev builds. Distribution config gets added later.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    DEAD_CODE_STRIPPING: YES

# Telemetry SDKs. Product analytics (PostHog) + crash reporting (Sentry).
# Both are inert unless a release injects keys (see the per-target settings
# below): a plain `xcodegen + xcodebuild` dev build ships with empty keys and
# never touches either network.
# Pinned EXACTLY (not `from:`): the .xcodeproj — and with it the only
# Package.resolved — is gitignored, so a range would let every CI release
# resolve whatever the latest compatible SDK is at build time. Exact pins
# keep releases reproducible from a tag; bump deliberately.
packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    exactVersion: 3.59.3
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    exactVersion: 9.16.1

targets:
  Burrow:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        excludes: ["Info.plist", "Burrow.entitlements"]
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true   # menu-bar agent, no Dock icon
        CFBundleDisplayName: Burrow
        CFBundleShortVersionString: "0.7.2"
        CFBundleVersion: "10"
        NSHumanReadableCopyright: "MIT License. Mole CLI © tw93. Independent, not affiliated with mole.fit."
        # Friendly, one-time prompts for the standard folders Mole scans
        # (purge/installer touch these). Full Disk Access still covers the
        # cache/container locations — see the in-app FDA gate.
        NSDesktopFolderUsageDescription: "Burrow scans your Desktop for reclaimable artifacts and leftover installers."
        NSDocumentsFolderUsageDescription: "Burrow scans your Documents for reclaimable project artifacts."
        NSDownloadsFolderUsageDescription: "Burrow scans your Downloads for leftover installer files (.dmg, .pkg)."
        NSRemovableVolumesUsageDescription: "Burrow analyzes external drives when you point it at them."
        # Telemetry keys, expanded from build settings at build time. Empty in
        # dev builds (the defaults below) → analytics/crash reporting stay off.
        # A release injects real values via `xcodebuild VAR=...` (see scripts/).
        PHPostHogApiKey: "$(POSTHOG_API_KEY)"
        PHPostHogHost: "$(POSTHOG_HOST)"
        SentryDSN: "$(SENTRY_DSN)"
    entitlements:
      path: Resources/Burrow.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.caezium.Burrow
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Telemetry defaults: empty → off. Releases override these on the
        # xcodebuild command line (sourced from the gitignored release.env).
        POSTHOG_API_KEY: ""
        POSTHOG_HOST: "https://us.i.posthog.com"
        SENTRY_DSN: ""
    dependencies:
      - package: PostHog
      - package: Sentry

  BurrowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    info:
      path: Tests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.caezium.BurrowTests
    dependencies:
      - target: Burrow

# Shared scheme so `xcodebuild test` works headlessly (CI and CLI runs)
# instead of depending on Xcode auto-creating a local scheme on first open.
schemes:
  Burrow:
    build:
      targets:
        Burrow: all
        BurrowTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BurrowTests
